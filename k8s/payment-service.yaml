apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: primehealth/payment-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5004
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: primehealth-config
              key: PAYMENT_PORT
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: primehealth-config
              key: MONGODB_URI_PAYMENT
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: primehealth-secrets
              key: JWT_SECRET
        - name: APPOINTMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: primehealth-config
              key: APPOINTMENT_SERVICE_URL
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: primehealth-config
              key: NODE_ENV
        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 15
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 5004
      targetPort: 5004
  type: ClusterIP
