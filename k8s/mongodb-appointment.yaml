apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-appointment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-appointment
  template:
    metadata:
      labels:
        app: mongodb-appointment
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-appointment
spec:
  selector:
    app: mongodb-appointment
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
