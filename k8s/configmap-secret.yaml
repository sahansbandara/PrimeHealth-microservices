apiVersion: v1
kind: ConfigMap
metadata:
  name: primehealth-config
data:
  NODE_ENV: "development"
  APPOINTMENT_PORT: "5003"
  PAYMENT_PORT: "5004"
  DOCTOR_PORT: "5002"
  GATEWAY_PORT: "5000"
  MONGODB_URI_APPOINTMENT: "mongodb://mongodb-appointment:27017/appointmentDB"
  MONGODB_URI_PAYMENT: "mongodb://mongodb-payment:27017/paymentDB"
  DOCTOR_SERVICE_URL: "http://doctor-service:5002"
  APPOINTMENT_SERVICE_URL: "http://appointment-service:5003"
  PAYMENT_SERVICE_URL: "http://payment-service:5004"
  FRONTEND_URL: "http://localhost:3000" # For local testing

---
apiVersion: v1
kind: Secret
metadata:
  name: primehealth-secrets
type: Opaque
data:
  # echo -n "sithmisupersecretkey2026" | base64 -> c2l0aG1pc3VwZXJzZWNyZXRrZXkyMDI2
  JWT_SECRET: "c2l0aG1pc3VwZXJzZWNyZXRrZXkyMDI2"
